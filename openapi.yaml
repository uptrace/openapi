          type: boolean
        teamIds:
          type: array
          items:
            type: integer
        channelIds:
          type: array
          items:
            type: integer
        repeatInterval:
          $ref: "#/components/schemas/RepeatInterval"
        params:
          type: object
          additionalProperties: true
        trendAggFunc:
          type: string
          description: Aggregation function used to compute the trend baseline.
          enum: [sum, avg, median, last]
        trendSensitivity:
          type: string
          description: Sensitivity level of the trend-based anomaly detector.
          enum: [low, medium, high]
        trendUpdatedAt:
          type: number
          description: Unix timestamp (nanoseconds) when the trend baseline was last refreshed.
        createdAt:
          type: number
        updatedAt:
          type: number
        checkedAt:
          type: number
          description: Unix timestamp (nanoseconds) when the monitor was last evaluated.
        nextCheckTime:
          type: number
          description: Unix timestamp (nanoseconds) when the monitor is scheduled to be evaluated next.
