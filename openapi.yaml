          schema:
            type: string
        - name: status
          in: query
          required: false
          description: Filter monitors by status (e.g. active, paused, failing).
          schema:
            type: string
        - name: sort_by
          in: query
          required: false
          description: Column to sort by.
          schema:
            type: string
        - name: sort_dir
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/SortDirection"
