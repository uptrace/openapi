            - $ref: "#/components/schemas/TeamsParams"
            - $ref: "#/components/schemas/PushoverParams"
            - $ref: "#/components/schemas/WebhookParams"
            - $ref: "#/components/schemas/AlertmanagerParams"
            - $ref: "#/components/schemas/IncidentioParams"
        monitorIds:
          type: array
          items:
            type: integer
            format: int64
        monitorCount:
          type: integer
        sentCount:
          type: integer
        lastSentAt:
          type: string
          format: date-time
