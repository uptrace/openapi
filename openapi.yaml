components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
    authTokenQuery:
      type: apiKey
      in: query
      name: auth_token
    uptraceDSNHeader:
      type: apiKey
      in: header
      name: uptrace-dsn
    dsnQuery:
      type: apiKey
      in: query
      name: dsn

  parameters:
    ProjectId:
      name: project_id
      in: path
      required: true
      description: Uptrace project ID.
      schema:
        type: integer
        format: int64
    OrgId:
      name: org_id
      in: path
      required: true
      description: Organization ID.
      schema:
        type: integer
        format: uint64
    AlertId:
      name: alert_id
      in: path
      required: true
      description: Alert ID.
      schema:
        type: integer
        format: uint64
    MonitorId:
      name: monitor_id
      in: path
      required: true
      description: Monitor ID.
      schema:
        type: integer
        format: int64
    TimeStart:
      name: time_start
      in: query
      required: true
      description: Start time (inclusive) as RFC3339 timestamp.
      schema:
        type: string
        format: date-time
        description: RFC3339 timestamp.
      example: 2023-07-10T00:00:00Z
    TimeEnd:
      name: time_end
      in: query
      required: true
      description: End time (exclusive) as RFC3339 timestamp.
      schema:
        type: string
        format: date-time
        description: RFC3339 timestamp.
      example: 2023-07-11T00:00:00Z
    Limit:
      name: limit
      in: query
      required: false
      description: Limit number of results.
      schema:
        type: integer
        format: int32
      example: 10000
    DashboardId:
      name: dashboard_id
      in: path
      required: true
      description: Dashboard ID.
      schema:
        type: integer
        format: int64
    ChannelId:
      name: channel_id
      in: path
      required: true
      description: Notification channel ID.
      schema:
        type: integer
        format: int64
    GridItemId:
      name: grid_item_id
      in: path
      required: true
      description: Grid item ID.
      schema:
        type: integer
        format: int64
    SectionId:
      name: section_id
      in: path
      required: true
      description: Grid section ID.
      schema:
        type: integer
        format: int64

  schemas:
    AlertType:
      type: string
      description: Alert type.
      enum: [error, metric]

    AlertStatus:
      type: string
      description: Alert resolution status.
      enum: [unresolved, resolved, archived]

    AlertActivityState:
      type: string
      description: Alert activity state while unresolved.
      enum: [new, ongoing, escalated, regressed]

    AlertPriority:
      type: string
      description: Alert priority level.
      enum: [info, low, medium, high]

    Alert:
      type: object
      description: An alert fired by a monitor.
      properties:
        id:
          type: integer
          format: uint64
        projectId:
          type: integer
          format: uint32
        monitorId:
          type: integer
          format: uint64
        name:
          type: string
        type:
          $ref: "#/components/schemas/AlertType"
        attrs:
          type: object
          additionalProperties: true
          description: Custom alert attributes.
        event:
          $ref: "#/components/schemas/AlertEvent"
        createdAt:
          type: integer
          format: int64
          description: Unix timestamp (nanoseconds).
        updatedAt:
          type: integer
          format: int64
          description: Unix timestamp (nanoseconds).
      required:
        - id
        - projectId
        - name
        - type

    AlertEvent:
      type: object
      description: A lifecycle event on an alert.
      properties:
        id:
          type: integer
          format: uint64
        alertId:
          type: integer
          format: uint64
        name:
          type: string
          description: "Event type: created, status_changed, state_changed, priority_changed, recurring, note, assigned."
        status:
          $ref: "#/components/schemas/AlertStatus"
        activityState:
          $ref: "#/components/schemas/AlertActivityState"
        priority:
          $ref: "#/components/schemas/AlertPriority"
        createdAt:
          type: integer
          format: int64
          description: Unix timestamp (nanoseconds).
      required:
        - id
        - alertId
        - name
        - status

    User:
      type: object
      description: A registered user account.
      properties:
        id:
          type: integer
          format: uint64
        name:
          type: string
        email:
          type: string
        emailConfirmed:
          type: boolean
        avatar:
          type: string
          description: URL to the user's avatar image.
        emailsMutedUntil:
          type: number
          description: Unix timestamp in nanoseconds until emails are muted.
        otpEnabled:
          type: boolean
          description: Whether two-factor authentication is enabled.
        lastReadAt:
          type: number
          description: Unix timestamp in nanoseconds of last read.
        timeZone:
          type: string
          description: IANA time zone (e.g., America/New_York).
        createdAt:
          type: number
          description: Unix timestamp in nanoseconds.
      required:
        - id
        - name
        - email

    Org:
      type: object
      description: An organization.
      properties:
        id:
          type: integer
          format: uint64
        name:
          type: string
        status:
          type: string
        budget:
          type: number
          format: float64
        mfaRequired:
          type: boolean
        dynamicSampling:
          type: boolean
        createdAt:
          type: number
          description: Unix timestamp in nanoseconds.
        updatedAt:
          type: number
          description: Unix timestamp in nanoseconds.
      required:
        - id
        - name

    OrgResponse:
      type: object
      properties:
        org:
          $ref: "#/components/schemas/Org"
      required:
        - org

    OrgCreateRequest:
      type: object
      properties:
        name:
          type: string
        budget:
          type: number
          format: float64
          description: Organization budget. Defaults to the system default if not set.
      required:
        - name

    OrgUpdateRequest:
      type: object
      properties:
        name:
          type: string
        mfaRequired:
          type: boolean
      required:
        - name

    Project:
      type: object
      description: A project within an organization.
      properties:
        id:
          type: integer
          format: uint32
        orgId:
          type: integer
          format: uint64
        name:
          type: string
        samplingMode:
          type: string
          enum: [org_wide, dynamic, disabled, fixed]
        samplingFraction:
          type: number
          format: float64
        samplingBudget:
          type: number
          format: float64
        suspended:
          type: boolean
        groupByEnv:
          type: boolean
        groupFuncsByService:
          type: boolean
        semconvVersion:
          type: string
          enum: [none, "v1.25.0", "v1.33.0"]
        displayLogSeverity:
          type: boolean
        countDistinct:
          type: boolean
        spanQuery:
          type: string
        spanColumns:
          type: array
          items:
            type: string
        spanTimeRange:
          type: string
          description: Duration string (e.g., 24h).
        spanRetention:
          type: string
          description: Duration string (e.g., 720h).
        logQuery:
          type: string
        logColumns:
          type: array
          items:
            type: string
        logTimeRange:
          type: string
          description: Duration string (e.g., 24h).
        logRetention:
          type: string
          description: Duration string (e.g., 720h).
        eventQuery:
          type: string
        eventColumns:
          type: array
          items:
            type: string
        eventTimeRange:
          type: string
          description: Duration string (e.g., 24h).
        eventRetention:
          type: string
          description: Duration string (e.g., 720h).
        traceQuery:
          type: string
        traceColumns:
          type: array
          items:
            type: string
        traceTimeRange:
          type: string
          description: Duration string (e.g., 24h).
        metricRetention:
          type: string
          description: Duration string (e.g., 720h).
        createdAt:
          type: number
          description: Unix timestamp in nanoseconds.
        updatedAt:
          type: number
          description: Unix timestamp in nanoseconds.
        orgName:
          type: string
        mfaRequired:
          type: boolean
      required:
        - id
        - name

    ProjectResponse:
      type: object
      properties:
        project:
          $ref: "#/components/schemas/Project"
      required:
        - project

    ProjectCreateRequest:
      type: object
      properties:
        name:
          type: string
        groupByEnv:
          type: boolean
        groupFuncsByService:
          type: boolean
        semconvVersion:
          type: string
          enum: [none, "v1.25.0", "v1.33.0"]
        displayLogSeverity:
          type: boolean
        countDistinct:
          type: boolean
        spanTimeRange:
          type: string
          description: Duration string (e.g., 24h).
        logTimeRange:
          type: string
          description: Duration string (e.g., 24h).
        eventTimeRange:
          type: string
          description: Duration string (e.g., 24h).
        spanRetention:
          type: string
          description: Duration string (e.g., 720h).
        logRetention:
          type: string
          description: Duration string (e.g., 720h).
        eventRetention:
          type: string
          description: Duration string (e.g., 720h).
        metricRetention:
          type: string
          description: Duration string (e.g., 720h).
      required:
        - name

    SortDirection:
      type: string
      enum: [ASC, DESC]
      description: Sort direction.

    OrderItem:
      type: object
      properties:
        key:
          type: string
        order:
          type: string
          enum: [asc, desc]

    Span:
      type: object
      description: A span representing an individual operation in a distributed trace.
      properties:
        id:
          type: string
          description: Span ID (hex-encoded).
        parentId:
          type: string
          description: Parent span ID (hex-encoded, empty for root spans).
        traceId:
          type: string
          description: Trace ID (hex-encoded).
        standalone:
          type: boolean
          description: Whether the span is standalone (not part of a trace).
        projectId:
          type: integer
          format: uint32
          description: Project ID.
        groupId:
          type: string
          description: Group ID (uint64 as string).
        type:
          type: string
          description: Telemetry type (spans, events, logs, funcs).
        system:
          type: string
          description: Detected system (e.g., httpserver:all, db:postgresql, log:error).
        kind:
          type: string
          description: Span kind (client, server, producer, consumer, internal).
        name:
          type: string
          description: Span name.
        eventName:
          type: string
          description: Event name (for event spans).
        displayName:
          type: string
          description: Human-readable operation summary.
        time:
          type: number
          format: double
          description: Span start time as unix milliseconds.
        duration:
          type: number
          format: double
          description: Duration in milliseconds.
        statusCode:
          type: string
          description: Status code (ok, error, unset).
        statusMessage:
          type: string
          description: Optional status message.
        attrs:
          type: object
          additionalProperties: true
          description: Span attributes as key-value map. Keys include type suffix (e.g., service_name::str, count::int).
        events:
          type: array
          description: Child event spans.
          items:
            type: object
            additionalProperties: true
        logs:
          type: array
          description: Child log spans.
          items:
            type: object
            additionalProperties: true
        links:
          type: array
          description: Span links to other spans.
          items:
            type: object
            properties:
              traceId:
                type: string
              spanId:
                type: string
              attrs:
                type: object
                additionalProperties: true
      required: [id, traceId, name, time, duration, statusCode]

    GroupsResult:
      type: object
      description: Result of a span group aggregation query.
      properties:
        groups:
          type: array
          description: Array of group rows with dynamic columns. Each row may contain __hash, __name, __query metadata fields.
          items:
            type: object
            additionalProperties: true
        columns:
          type: array
          description: Column definitions describing the result schema.
          items:
            $ref: "#/components/schemas/QueryColumn"
        hasMore:
          type: boolean
          description: Whether more results exist beyond the limit.
        query:
          type: array
          description: Parsed query parts with error state.
          items:
            type: object
            additionalProperties: true
        join:
          type: array
          description: >-
            Parsed sub-query clauses for each joined alias. Populated only by
            list_trace_groups (one entry per non-root sub-query); empty for span groups.
          items:
            type: array
            items:
              type: object
              additionalProperties: true
        sorting:
          type: array
          description: Applied sorting configuration.
          items:
            $ref: '#/components/schemas/OrderItem'
        search:
          type: array
          description: Applied search matchers.
          items:
            type: object
            additionalProperties: true
        whereAttrs:
          type: object
          description: Map of WHERE attribute names to their matched values.
          additionalProperties: true
      required: [groups]

    QueryColumn:
      type: object
      description: Column definition for a query result.
      properties:
        name:
          type: string
          description: Column name.
        expr:
          type: string
          description: Column expression as written in the query.
        unit:
          type: string
          description: Column unit (e.g., ms, bytes).
        isNum:
          type: boolean
          description: Whether the column contains numeric values.
        isAgg:
          type: boolean
          description: Whether the column is an aggregation.
        isGroup:
          type: boolean
          description: Whether the column is a GROUP BY key.
        aggFunc:
          type: string
          description: Aggregation function applied to this column.
      required: [name]

    Timeseries:
      type: object
      description: A named timeseries with values aligned to timestamps.
      properties:
        name:
          type: string
          description: Metric name (e.g., countPerMin, errorCountPerMin, durationP50, durationP90, durationP99).
        value:
          type: array
          description: Array of metric values.
          items:
            type: number
            format: double
        time:
          type: array
          description: Array of timestamps as unix milliseconds.
          items:
            type: number
            format: double
      required: [name, value, time]

    AnnotationCreateRequest:
      type: object
      properties:
        name:
          type: string
          description: Annotation name.
        description:
          type: string
          description: Annotation description text in Markdown format.
        color:
          type: string
          description: Color to be used in charts.
        attrs:
          type: object
          additionalProperties:
            type: string
          description: Key-value metadata.
        fingerprint:
          type: string
          description: Unique string used for deduplication.
        time:
          type: string
          format: date-time
          description: Overrides annotation time in RFC3339 format.
        closeAlerts:
          $ref: "#/components/schemas/CloseAlertsParams"
      required:
        - name

    CloseAlertsParams:
      type: object
      description: >-
        Optional directive to close matching open alerts when the annotation is created.
        Alerts whose type matches and whose attributes contain all key/value pairs in attrs are closed.
      properties:
        type:
          type: string
          description: Alert type to close.
          enum: [error, metric]
        attrs:
          type: object
          additionalProperties:
            type: string
          description: Attribute key/value pairs that an alert must match to be closed.
      required:
        - type
    ListDashboardTemplatesResponse:
      type: object
      properties:
        templates:
          type: array
          items:
            $ref: "#/components/schemas/DashboardTemplateItem"
        tags:
          type: array
          items:
            type: string
          description: All unique tags across templates.
        statuses:
          type: array
          description: Per-status counts across the project (ignores the status filter).
          items:
