  /internal/v1/alerts/{project_id}:
    get:
      summary: List alerts
      x-badges:
        - name: beta
      operationId: list_alerts
      description: >-
        List alerts with optional filtering by status, priority, type, activity state,
        monitor ID, and free-text search. Returns alerts sorted by most recent event by default.
      tags: [Alerts]
      parameters:
        - $ref: "#/components/parameters/ProjectId"
        - name: search
          in: query
          description: Free-text search across alert name and attributes. Supports scoped search (e.g., alert.status:resolved).
          schema:
            type: string
        - name: attrs[status][]
          in: query
          description: Filter by alert status. Can be repeated for multiple values.
          schema:
            type: array
            items:
              $ref: "#/components/schemas/AlertStatus"
        - name: attrs[priority][]
          in: query
          description: Filter by alert priority. Can be repeated for multiple values.
          schema:
            type: array
            items:
              $ref: "#/components/schemas/AlertPriority"
        - name: attrs[type][]
          in: query
          description: Filter by alert type. Can be repeated for multiple values.
          schema:
            type: array
            items:
              $ref: "#/components/schemas/AlertType"
        - name: attrs[activityState][]
          in: query
          description: Filter by activity state. Can be repeated for multiple values.
          schema:
            type: array
            items:
              $ref: "#/components/schemas/AlertActivityState"
        - name: attrs[monitorId][]
          in: query
          description: Filter by monitor ID. Can be repeated for multiple values.
          schema:
            type: array
            items:
              type: integer
              format: uint64
        - name: sort_by
          in: query
          description: Field to sort by. Defaults to event.created_at.
          schema:
            type: string
          example: created_at
        - name: sort_dir
          in: query
          description: Sort direction. Defaults to DESC.
          schema:
            $ref: "#/components/schemas/SortDirection"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: List of alerts.
          content:
            application/json:
              schema:
                type: object
                required:
                  - alerts
                  - count
                properties:
                  alerts:
                    type: array
                    items:
                      $ref: "#/components/schemas/Alert"
                  count:
                    type: integer
                    description: Total number of matching alerts.
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalError"

