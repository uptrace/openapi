  /internal/v1/metrics/{project_id}/explore:
    get:
      summary: Explore metrics
      operationId: explore_metrics
      description: >-
        Discover available metrics and their metadata.
        Returns metric names, instrument types (histogram, counter, gauge, additive),
        units, descriptions, available attributes, and library info.
        Use the instrument type to choose the correct aggregate function:
        histogram metrics support count(), p50(), p90(), p99();
        counter metrics support sum(), perMin(sum());
        gauge metrics support sum(), avg(), max(), min();
        additive metrics support sum(), perMin(sum()).
        Use the search parameter to filter by metric name.
        Use this tool before creating dashboards to discover metrics and their attributes.
      tags: [Metrics]
      parameters:
        - $ref: "#/components/parameters/ProjectId"
        - $ref: "#/components/parameters/TimeStart"
        - $ref: "#/components/parameters/TimeEnd"
        - name: search
          in: query
          required: false
          description: Search string to filter metrics by name (substring match).
          schema:
            type: string
        - name: instrument
          in: query
          required: false
          description: >-
            Filter by instrument type. Can be repeated to pass multiple values
            (e.g. instrument=counter&instrument=gauge). Allowed values:
            histogram, counter, gauge, additive.
          schema:
            type: array
            items:
              type: string
          example: ["counter"]
        - name: library_name
          in: query
          required: false
          description: >-
            Filter by instrumentation library name (exact match). Can be repeated;
            results match any of the listed libraries.
          schema:
            type: array
            items:
              type: string
          example: ["go.opentelemetry.io/contrib/instrumentation/runtime"]
        - name: attr_key_exists
          in: query
          required: false
          description: >-
            Return only metrics that expose all of the listed attribute keys (AND
            semantics). Uptrace normalizes attribute keys by replacing dots with
            underscores (service.name → service_name), so pass the underscored form.
          schema:
            type: array
            items:
              type: string
          example: ["host_name"]
      responses:
        "200":
          description: Metrics list.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExploreMetricsResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

