        name:
          type: string
        isNameTemplated:
          type: boolean
          description: True when the name contains template placeholders that are expanded at evaluation time.
        type:
          type: string
          enum: [metric, error]
        status:
          type: string
          enum: [active, paused, firing, no_data, disabled]
